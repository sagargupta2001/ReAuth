[server]
scheme = "http"
host = "0.0.0.0"
port = 3000
public_url = "http://host.docker.internal:3000"

[ui]
dev_url = "http://localhost:5173"

[auth]
# Keep PKCE for public clients; the conformance suite should use it when discovery advertises S256.
pkce_required_public_clients = true

[default_admin]
username = "admin"
password = "admin"

[default_oidc_client]
client_id = "reauth-conformance"
redirect_uris = [
  "https://localhost.emobix.co.uk:8443/test/a/reauth/callback",
  "https://localhost:8443/test/a/reauth/callback"
]
web_origins = []
